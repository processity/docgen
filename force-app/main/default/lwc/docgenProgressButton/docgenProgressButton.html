<template>
  <div class="slds-m-around_medium">
    <template if:true={showButton}>
      <lightning-button
        label={buttonLabel}
        onclick={handleGenerateClick}
        disabled={isProcessing}
        variant={buttonVariant}
      ></lightning-button>
    </template>

    <template if:true={showProgressPanel}>
      <div class="docgen-progress slds-m-top_small" aria-live="polite">
        <div class="docgen-progress__header">
          <span class="docgen-progress__status">{displayStatus}</span>
          <span class="docgen-progress__percent">{progressValue}%</span>
        </div>
        <div
          class="docgen-progress__track"
          role="progressbar"
          aria-label="Document generation progress"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow={progressValue}
        >
          <div class="docgen-progress__bar" style={progressBarStyle}></div>
        </div>
      </div>
    </template>

    <template if:true={showPreviewPanel}>
      <section
        class="slds-box slds-theme_default slds-m-top_medium"
        aria-label="Generated document preview"
      >
        <div
          class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small"
        >
          <h2 class="slds-text-heading_small">Preview Generated Document</h2>
          <lightning-button-icon
            icon-name="utility:new_window"
            variant="border-filled"
            alternative-text="Open generated file"
            title="Open generated file"
            onclick={handleOpenPreview}
          ></lightning-button-icon>
        </div>

        <template if:true={showInlinePreview}>
          <iframe
            class="preview-frame"
            src={previewUrl}
            title="Generated document preview"
          ></iframe>
        </template>

        <template if:true={showPreviewLoading}>
          <div class="preview-loading">
            <lightning-spinner
              alternative-text="Loading preview..."
              size="small"
            ></lightning-spinner>
            <p class="slds-text-body_regular slds-m-top_large">Loading preview...</p>
          </div>
        </template>

        <template if:true={showPreviewFallback}>
          <div class="slds-illustration slds-illustration_small preview-fallback">
            <lightning-icon icon-name="doctype:attachment" size="large"></lightning-icon>
            <p class="slds-text-body_regular slds-m-top_small">{fallbackMessage}</p>
            <a
              class="slds-m-top_small preview-record-link"
              href={openPreviewUrl}
              target="_blank"
              rel="noopener noreferrer"
            >
              Open generated document record
            </a>
          </div>
        </template>

        <div class="preview-actions slds-m-top_medium">
          <template if:true={showPreviewActionSpinner}>
            <div class="preview-action-status" role="status" aria-live="polite">
              <lightning-spinner
                alternative-text={previewActionMessage}
                size="small"
              ></lightning-spinner>
              <span>{previewActionMessage}</span>
            </div>
          </template>

          <div class="slds-grid slds-grid_align-end slds-gutters preview-action-buttons">
            <div class="slds-col slds-grow-none">
              <lightning-button
                label="Cancel"
                onclick={handleCancelPreview}
                disabled={disablePreviewActions}
              ></lightning-button>
            </div>
            <div class="slds-col slds-grow-none">
              <lightning-button
                label="Save"
                variant="brand"
                onclick={handleSavePreview}
                disabled={disablePreviewActions}
              ></lightning-button>
            </div>
          </div>
        </div>
      </section>
    </template>

    <template if:true={showSavedDownloadPanel}>
      <section
        class="slds-box slds-theme_default slds-m-top_medium"
        aria-label="Generated document saved"
      >
        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
          <h2 class="slds-text-heading_small">Generated Document Saved</h2>
          <lightning-button
            label="Download"
            variant="brand"
            icon-name="utility:download"
            onclick={handleDownloadSavedFile}
          ></lightning-button>
        </div>
      </section>
    </template>
  </div>
</template>
